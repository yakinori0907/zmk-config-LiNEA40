name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymap
        run: |
          # 1. キーマップデータを生成
          keymap parse -z config/LiNEA40.keymap > LiNEA40.yaml

          # 2. Pythonで「レイアウト定義ファイル」を作成し、リンクさせる
          python3 -c "
          import yaml
          import json
          from pathlib import Path
          
          # --- ステップA: 物理レイアウトファイル (layout.json) を作成 ---
          # 4行x10列 (40キー) + 1キー = 41キー の座標データ
          keys = [{'x': c, 'y': r} for r in range(4) for c in range(10)]
          keys.append({'x': 10.5, 'y': 1.5}) # 41個目のキー
          
          layout_data = {
              'layout_name': 'LiNEA40_Custom',
              'layouts': {
                  'LiNEA40_Custom': {
                      'layout': keys
                  }
              }
          }
          # ファイルとして保存
          Path('layout.json').write_text(json.dumps(layout_data))
          
          # --- ステップB: パース済みデータ (LiNEA40.yaml) を更新 ---
          yaml_file = Path('LiNEA40.yaml')
          data = yaml.safe_load(yaml_file.read_text())
          
          # 「layout.json というファイルを使ってね」と指示
          data['layout'] = {'qmk_info_json': 'layout.json'}
          
          # 上書き保存
          yaml_file.write_text(yaml.dump(data))
          "

          # 3. 画像生成
          keymap draw LiNEA40.yaml > LiNEA40.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LiNEA40.svg
          git commit -m "Update keymap visualization" || exit 0
          git push
