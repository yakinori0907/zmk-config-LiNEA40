name: Draw ZMK keymaps
on:
  workflow_dispatch: # 手動実行用
  push:
    paths:
      - "config/*.keymap"      # keymapファイルが更新された時
      - "keymap_config.yaml"   # 設定ファイルをいじった時も動くように追加しておくと便利です

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 画像をリポジトリに書き込むために必要
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymap
        # ★ここが重要： -c オプションで設定ファイルを指定します
        run: |
          keymap parse -z config/LiNEA40.keymap > LiNEA40.yaml
          keymap -c keymap_config.yaml draw LiNEA40.yaml > LiNEA40.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LiNEA40.svg
          # 変更がない場合にエラーにならないように || exit 0 をつけています
          git commit -m "Update keymap visualization" || exit 0
          git push
