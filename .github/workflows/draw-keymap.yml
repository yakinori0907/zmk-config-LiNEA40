name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymap
        run: |
          # 1. まずキーマップデータを生成
          keymap parse -z config/LiNEA40.keymap > LiNEA40.yaml

          # 2. 生成されたデータ内の「LiNEA40」という不明なレイアウト指定を、
          #    「4行10列のOrtho配列」という定義に強制的に書き換えます
          sed -i 's/zmk_keyboard: .*/ortho_layout: {rows: 4, columns: 10}/' LiNEA40.yaml

          # 3. 書き換えたデータを使って画像生成（設定ファイル指定 -c は削除）
          keymap draw LiNEA40.yaml > LiNEA40.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LiNEA40.svg
          git commit -m "Update keymap visualization" || exit 0
          git push
