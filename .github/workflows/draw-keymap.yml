name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymap
        run: |
          # 1. キーマップデータを生成
          keymap parse -z config/LiNEA40.keymap > LiNEA40.yaml

          # 2. Pythonで「qmk_info_json」形式を使って41キーを定義
          python3 -c "
          import yaml
          from pathlib import Path
          
          yaml_file = Path('LiNEA40.yaml')
          data = yaml.safe_load(yaml_file.read_text())
          
          # 4行x10列の座標を作成
          layout_keys = [{'x': c, 'y': r} for r in range(4) for c in range(10)]
          
          # 41個目のキーを追加 (右側に配置)
          layout_keys.append({'x': 10.5, 'y': 1.5})
          
          # 【重要】ツールが納得する形式 (qmk_info_json) でラップする
          data['layout'] = {
              'qmk_info_json': {
                  'layout_name': 'LiNEA40_Custom',
                  'layouts': {
                      'LiNEA40_Custom': {
                          'layout': layout_keys
                      }
                  }
              }
          }
          
          yaml_file.write_text(yaml.dump(data))
          "

          # 3. 画像生成
          keymap draw LiNEA40.yaml > LiNEA40.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LiNEA40.svg
          git commit -m "Update keymap visualization" || exit 0
          git push
