name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymap
        run: |
          keymap parse -z config/LiNEA40.keymap > LiNEA40.yaml

          # Pythonでレイアウト定義を書き換え
          # 41キーに対応するため、列数を「11」に増やして余裕を持たせます (4x11=44キー)
          python3 -c "
          import yaml
          from pathlib import Path
          
          yaml_file = Path('LiNEA40.yaml')
          data = yaml.safe_load(yaml_file.read_text())
          
          # 物理レイアウト定義: 4行 x 11列 (44キー) に設定
          # 余った部分は空白になりますが、エラーは出なくなります
          data['layout'] = {'ortho_layout': {'rows': 4, 'columns': 11}}
          
          yaml_file.write_text(yaml.dump(data))
          "

          keymap draw LiNEA40.yaml > LiNEA40.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LiNEA40.svg
          git commit -m "Update keymap visualization" || exit 0
          git push
