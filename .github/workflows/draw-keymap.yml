name: Draw ZMK keymaps
on:
  workflow_dispatch:
  push:
    paths:
      - "config/*.keymap"

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: install keymap-drawer
        run: pip install keymap-drawer

      - name: Draw keymap
        run: |
          # 1. キーマップデータを生成
          keymap parse -z config/LiNEA40.keymap > LiNEA40.yaml

          # 2. Pythonを使って安全にレイアウト情報を注入
          # (sedの代わりにこれを使います)
          python3 -c "
          import yaml
          from pathlib import Path
          
          # YAMLファイルを読み込む
          yaml_file = Path('LiNEA40.yaml')
          data = yaml.safe_load(yaml_file.read_text())
          
          # レイアウト定義を追加 (4行10列のOrtho配列)
          # もし12列なら columns: 12 に変更してください
          data['layout'] = {'ortho_layout': {'rows': 4, 'columns': 10}}
          
          # 上書き保存
          yaml_file.write_text(yaml.dump(data))
          "

          # 3. 画像生成
          keymap draw LiNEA40.yaml > LiNEA40.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add LiNEA40.svg
          git commit -m "Update keymap visualization" || exit 0
          git push
